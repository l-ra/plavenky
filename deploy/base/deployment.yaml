apiVersion: apps/v1
kind: Deployment
metadata:
  name: plavenky
  labels:
    app: plavenky
spec:
  replicas: 1
  selector:
    matchLabels:
      app: plavenky
  template:
    metadata:
      labels:
        app: plavenky
    spec:
      containers:
        - name: plavenky
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
            - name: config
              mountPath: /usr/share/nginx/html/config.json
              subPath: config.json
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
      volumes:
        - name: html
          configMap:
            name: plavenky-html
        - name: config
          configMap:
            name: plavenky-config
